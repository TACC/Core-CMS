{# @var plugin_logo, className #}
<a
  id="header-logo"
  class="navbar-brand {{ className }}"
  href="{{ plugin_logo.link_href }}"
  {% if plugin_logo.link_target %}
  target="{{ plugin_logo.link_target }}"
  {% endif %}
>
  <img
    class="portal-logo"
    src="{{ plugin_logo.img_file_src }}"
    crossorigin="anonymous"
    {% if plugin_logo.img_alt_text %}
    alt="{{ plugin_logo.img_alt_text }}"
    {% endif %}
  />
</a>
